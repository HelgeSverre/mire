<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mire · AgentHarness prototype</title>

  <!--
    Visual design prototype for the Mire.AgentHarness demo.
    NOT wired to the F# code — it mirrors the screens/states so the design can be
    eyeballed and clicked through in a browser. The TUI is glyph-cell based; this
    approximates it with monospace + the Mire brand tokens.

    Brand discipline (brand/USAGE.md): JetBrains Mono throughout, emerald used as the
    single accent moment (the prompt glyph), neutrals carry hierarchy, selection is
    inverse. Status colors (green/amber/red/blue) are *functional* (tool/diff/toast),
    not decoration — the same pragmatic extension the F# Theme.fs makes.
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../brand/palette.css">

  <style>
    :root {
      --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;
      /* functional status colors (mirror Mire.Widgets.Style) — used only for state */
      --ok:    #4CAF50;
      --warn:  #FFA000;
      --err:   #FF5722;
      --info:  #4A90D9;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--neutral-950);
      color: var(--fg);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── terminal window frame ───────────────────────────────────────────── */
    .term {
      width: min(980px, 100%);
      height: min(680px, 92vh);
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      box-shadow: 0 1px 0 var(--neutral-800);
    }

    /* ── status header ───────────────────────────────────────────────────── */
    header.status {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elevated);
      font-size: 13px;
      flex: none;
    }
    .mark { color: var(--fg); font-weight: 500; }
    .mark .sub { color: var(--fg-muted); font-weight: 400; }
    .grow { flex: 1; }
    .chip {
      border: 1px solid var(--border-strong);
      border-radius: 3px;
      padding: 1px 8px;
      color: var(--fg-muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .chip[data-mode="auto-accept"] { color: var(--ok);   border-color: var(--ok); }
    .chip[data-mode="plan"]        { color: var(--info); border-color: var(--info); }
    .tokens { color: var(--fg-subtle); font-size: 12px; white-space: nowrap; }

    /* ── body: transcript + sidebar ──────────────────────────────────────── */
    .body { flex: 1; display: flex; min-height: 0; }
    .transcript {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      min-width: 0;
      scroll-behavior: smooth;
    }
    aside.context {
      width: 220px;
      flex: none;
      border-left: 1px solid var(--border);
      padding: 10px 12px;
      overflow-y: auto;
      color: var(--fg-muted);
      font-size: 13px;
    }
    aside.context h4 {
      margin: 0 0 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--fg-subtle);
      font-weight: 500;
    }
    aside.context .row { display: flex; gap: 8px; padding: 1px 0; }
    aside.context .row + h4 { margin-top: 14px; }

    /* ── transcript blocks ───────────────────────────────────────────────── */
    .block { margin: 0 0 12px; }
    .who { font-size: 12px; color: var(--fg-subtle); margin-bottom: 2px; }
    .who.user::before     { content: "❯ "; color: var(--accent); }
    .who.assistant::before{ content: "◆ "; color: var(--fg-muted); }
    .md { color: var(--fg); }
    .md :is(h1,h2,h3) { font-weight: 700; line-height: 1.25; margin: 10px 0 4px; letter-spacing: -0.01em; }
    .md h1 { font-size: 18px; } .md h2 { font-size: 16px; } .md h3 { font-size: 14px; color: var(--fg-muted); }
    .md p { margin: 4px 0; }
    .md ul, .md ol { margin: 4px 0; padding-left: 20px; }
    .md li { margin: 1px 0; }
    .md code { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 3px; padding: 0 4px; font-size: 13px; }
    .md pre { background: var(--bg-elevated); border: 1px solid var(--border); border-left: 2px solid var(--border-strong); border-radius: 4px; padding: 8px 10px; overflow-x: auto; margin: 6px 0; }
    .md pre code { background: none; border: none; padding: 0; }
    .md blockquote { margin: 6px 0; padding: 2px 10px; border-left: 2px solid var(--border-strong); color: var(--fg-muted); }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .md a { color: var(--fg); text-decoration: underline; text-decoration-color: var(--fg-subtle); }
    .md strong { font-weight: 700; } .md em { font-style: italic; }
    .md del { text-decoration: line-through; color: var(--fg-subtle); }

    /* cards (tool/diff/table/error/notice/thinking/plan) */
    .card { border: 1px solid var(--border); border-radius: 4px; margin: 6px 0; overflow: hidden; }
    .card > .head {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 10px; background: var(--bg-elevated);
      border-bottom: 1px solid var(--border); font-size: 12px; color: var(--fg-muted);
    }
    .card > .head .grow { text-align: right; }
    .card > .out { padding: 6px 10px; white-space: pre-wrap; color: var(--fg-muted); font-size: 13px; max-height: 160px; overflow-y: auto; }
    .status-ok   { color: var(--ok); }
    .status-err  { color: var(--err); }
    .status-run  { color: var(--fg-muted); }
    .spinner { color: var(--fg-muted); }

    .thinking { border-style: dashed; }
    .thinking .out { font-style: italic; }

    .diff .out { color: var(--fg); }
    .diff .add { color: var(--ok); }
    .diff .del { color: var(--err); }
    .diff .ctx { color: var(--fg-subtle); }

    table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.data th, table.data td { text-align: left; padding: 3px 10px; border-bottom: 1px solid var(--border); }
    table.data th { color: var(--fg-subtle); font-weight: 500; }
    .badge { border-radius: 3px; padding: 0 6px; font-size: 12px; border: 1px solid currentColor; }
    .badge.ok { color: var(--ok); } .badge.warn { color: var(--warn); } .badge.err { color: var(--err); }

    .error.card  { border-color: var(--err); } .error .head { color: var(--err); }
    .notice.card { border-color: var(--info); } .notice .head { color: var(--info); }

    .plan .out { color: var(--fg); }
    .plan .done { color: var(--fg-subtle); text-decoration: line-through; }

    /* ── prompt ──────────────────────────────────────────────────────────── */
    .prompt {
      flex: none;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      background: var(--bg-elevated);
    }
    .prompt .glyph { color: var(--accent); font-weight: 700; }
    .prompt input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--fg); font-family: inherit; font-size: 14px;
    }
    .prompt input::placeholder { color: var(--fg-subtle); }

    footer.hints {
      flex: none; padding: 6px 14px; border-top: 1px solid var(--border);
      color: var(--fg-subtle); font-size: 12px; background: var(--bg);
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    footer.hints kbd {
      color: var(--fg-muted); border: 1px solid var(--border-strong);
      border-radius: 3px; padding: 0 4px; font-size: 11px;
    }

    /* ── overlays (palette / skill explorer) ─────────────────────────────── */
    .scrim {
      position: absolute; inset: 0; background: color-mix(in srgb, var(--neutral-950) 62%, transparent);
      display: flex; align-items: center; justify-content: center; padding: 28px;
    }
    .panel {
      background: var(--bg); border: 1px solid var(--border-strong);
      border-radius: 6px; display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 8px 28px color-mix(in srgb, var(--neutral-950) 70%, transparent);
    }
    .panel > .ptitle { padding: 6px 12px; border-bottom: 1px solid var(--border); color: var(--fg-muted); font-size: 12px; background: var(--bg-elevated); }
    .panel > .pfoot  { padding: 6px 12px; border-top: 1px solid var(--border); color: var(--fg-subtle); font-size: 12px; }

    /* command palette */
    .palette { width: 460px; max-height: 70%; }
    .palette .query { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .palette .query .glyph { color: var(--accent); }
    .palette ul { list-style: none; margin: 0; padding: 4px 0; overflow-y: auto; }
    .palette li { display: flex; gap: 12px; padding: 3px 12px; }
    .palette li .trig { color: var(--fg); min-width: 130px; }
    .palette li .desc { color: var(--fg-subtle); }
    .palette li.sel { background: var(--bg-elevated); }
    .palette li.sel .trig { color: var(--accent); }

    /* skill explorer — two scroll panes */
    .skills { width: 720px; height: 78%; }
    .skills .split { flex: 1; display: flex; min-height: 0; }
    .skills .list { width: 210px; flex: none; border-right: 1px solid var(--border); overflow-y: auto; padding: 4px 0; }
    .skills .list .item { padding: 3px 12px; color: var(--fg-muted); cursor: pointer; }
    .skills .list .item.sel { background: var(--bg-elevated); color: var(--accent); }
    .skills .preview { flex: 1; overflow-y: auto; padding: 10px 14px; min-width: 0; }
    .pane-active { box-shadow: inset 0 0 0 1px var(--border-strong); }

    /* ── permission dialog (native <dialog>) ─────────────────────────────── */
    dialog.permission {
      background: var(--bg); color: var(--fg); border: 1px solid var(--border-strong);
      border-radius: 6px; padding: 0; width: 440px; font-family: var(--font-mono);
      box-shadow: 0 10px 30px color-mix(in srgb, var(--neutral-950) 70%, transparent);
    }
    dialog.permission::backdrop { background: color-mix(in srgb, var(--neutral-950) 62%, transparent); }
    dialog.permission .dtitle { padding: 8px 14px; border-bottom: 1px solid var(--border); color: var(--warn); font-size: 13px; }
    dialog.permission .dbody { padding: 12px 14px; font-size: 13px; }
    dialog.permission .cmd { color: var(--fg); }
    dialog.permission .cmd::before { content: "❯ "; color: var(--accent); }
    dialog.permission .risk { color: var(--fg-muted); margin-top: 4px; }
    dialog.permission .actions { display: flex; gap: 10px; justify-content: flex-end; padding: 10px 14px; border-top: 1px solid var(--border); }
    dialog.permission button {
      font-family: inherit; font-size: 13px; cursor: pointer;
      background: var(--bg-elevated); color: var(--fg);
      border: 1px solid var(--border-strong); border-radius: 4px; padding: 4px 14px;
    }
    dialog.permission button:focus-visible,
    dialog.permission button.focus { outline: none; background: var(--fg); color: var(--neutral-950); }
    dialog.permission button.accept.focus { background: var(--accent-strong); color: #fff; border-color: var(--accent-strong); }
    dialog.permission .dfoot { padding: 0 14px 10px; color: var(--fg-subtle); font-size: 12px; text-align: right; }

    /* ── toasts ──────────────────────────────────────────────────────────── */
    .toasts { position: absolute; top: 50px; right: 12px; display: flex; flex-direction: column; gap: 8px; width: 240px; z-index: 5; }
    .toast { border: 1px solid var(--border-strong); border-radius: 4px; background: var(--bg-elevated); overflow: hidden; }
    .toast .thead { padding: 3px 10px; font-size: 12px; border-bottom: 1px solid var(--border); }
    .toast .tbody { padding: 4px 10px; font-size: 13px; color: var(--fg-muted); }
    .toast.ok   .thead { color: var(--ok); }
    .toast.warn .thead { color: var(--warn); }
    .toast.err  .thead { color: var(--err); }
    .toast.info .thead { color: var(--info); }

    .muted { color: var(--fg-subtle); }

    /* lightly colorized markdown */
    .md h1, .md h2 { color: var(--accent-300); }
    .md a { color: var(--info); text-decoration-color: var(--info); }
    .md pre .tok-kw { color: var(--info); }
    .md pre .tok-str { color: var(--ok); }
    .md pre .tok-com { color: var(--fg-subtle); }
    .md pre .tok-num { color: #26C6DA; }

    /* @mentions */
    .md .mention { color: var(--accent); }
    .mention-pop {
      position: absolute; left: 14px; bottom: 70px; width: 320px; z-index: 6;
      background: var(--bg); border: 1px solid var(--accent); border-radius: 5px; overflow: hidden;
      box-shadow: 0 8px 24px color-mix(in srgb, var(--neutral-950) 70%, transparent);
    }
    .mention-pop .mhint { padding: 4px 10px; font-size: 12px; color: var(--fg-subtle); border-bottom: 1px solid var(--border); }
    .mention-pop .mrow { padding: 2px 10px; font-size: 13px; color: var(--fg); cursor: pointer; }
    .mention-pop .mrow.sel { background: var(--fg); color: var(--neutral-950); }
    .pasting { color: var(--fg-subtle); }
  </style>
</head>

<body
  x-data="harness()"
  x-init="init()"
  @keydown.window="onKey($event)"
>
  <main class="term">
    <!-- status header -->
    <header class="status">
      <span class="mark">└ mire <span class="sub">· agent</span></span>
      <span class="grow"></span>
      <span class="chip" :data-mode="mode" x-text="mode"></span>
      <span class="tokens">opus-4.8</span>
      <span class="tokens" x-text="tokens.toLocaleString() + ' tok'"></span>
    </header>

    <!-- body -->
    <div class="body">
      <div class="transcript" x-ref="scroll">
        <template x-for="(b, i) in messages" :key="i">
          <div class="block">
            <!-- user -->
            <template x-if="b.kind === 'user'">
              <div><div class="who user">you</div><div class="md" x-text="b.text"></div></div>
            </template>
            <!-- assistant markdown -->
            <template x-if="b.kind === 'assistant'">
              <div><div class="who assistant">assistant</div><div class="md" x-html="md(b.text)"></div></div>
            </template>
            <!-- thinking -->
            <template x-if="b.kind === 'thinking'">
              <div class="card thinking"><div class="head">thinking</div><div class="out" x-text="b.text"></div></div>
            </template>
            <!-- tool -->
            <template x-if="b.kind === 'tool'">
              <div class="card">
                <div class="head">
                  <span x-text="b.name"></span><span class="muted">·</span><span class="md"><code x-text="b.cmd"></code></span>
                  <span class="grow"
                        :class="{'status-ok': b.status==='ok','status-err': b.status==='err','status-run': b.status==='run'}">
                    <template x-if="b.status==='run'"><span class="spinner" x-text="spinner + ' running…'"></span></template>
                    <template x-if="b.status==='ok'"><span x-text="'✓ ' + (b.meta||'')"></span></template>
                    <template x-if="b.status==='err'"><span x-text="'✗ ' + (b.meta||'')"></span></template>
                  </span>
                </div>
                <div class="out" x-text="b.out"></div>
              </div>
            </template>
            <!-- diff -->
            <template x-if="b.kind === 'diff'">
              <div class="card diff">
                <div class="head"><span x-text="b.file"></span></div>
                <div class="out"><template x-for="(l, j) in b.lines" :key="j"><div :class="l.t" x-text="l.s"></div></template></div>
              </div>
            </template>
            <!-- table -->
            <template x-if="b.kind === 'table'">
              <div class="card">
                <table class="data">
                  <thead><tr><template x-for="h in b.headers" :key="h"><th x-text="h"></th></template></tr></thead>
                  <tbody>
                    <template x-for="(r, j) in b.rows" :key="j">
                      <tr>
                        <td x-text="r.id"></td><td x-text="r.title"></td>
                        <td><span class="badge" :class="r.tone" x-text="r.status"></span></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </template>
            <!-- plan -->
            <template x-if="b.kind === 'plan'">
              <div class="card plan"><div class="head">plan</div><div class="out">
                <template x-for="(s, j) in b.steps" :key="j"><div :class="{done: s.done}" x-text="(s.done?'[x] ':'[ ] ') + s.text"></div></template>
              </div></div>
            </template>
            <!-- error / notice -->
            <template x-if="b.kind === 'error'">
              <div class="card error"><div class="head" x-text="'error'"></div><div class="out" x-text="b.text"></div></div>
            </template>
            <template x-if="b.kind === 'notice'">
              <div class="card notice"><div class="head" x-text="'notice'"></div><div class="out" x-text="b.text"></div></div>
            </template>
            <!-- files -->
            <template x-if="b.kind === 'files'">
              <div class="card"><div class="head">workspace</div><div class="out" x-text="b.text"></div></div>
            </template>
          </div>
        </template>
      </div>

      <aside class="context" x-show="sidebarOpen" x-cloak>
        <h4>tasks</h4>
        <template x-for="t in tasks" :key="t.name">
          <div class="row">
            <span :class="{'status-ok': t.s==='ok','status-run':t.s==='run'}"
                  x-text="t.s==='ok' ? '✓' : (t.s==='run' ? spinner : '·')"></span>
            <span x-text="t.name"></span>
          </div>
        </template>
        <h4>files</h4>
        <template x-for="f in files" :key="f"><div class="row"><span x-text="f"></span></div></template>
      </aside>
    </div>

    <!-- prompt -->
    <form class="prompt" @submit.prevent="submit()">
      <span class="glyph">❯</span>
      <input x-ref="input" x-model="input" :placeholder="placeholder" autofocus
             autocomplete="off" spellcheck="false" @input="onInput()" @paste="onPaste($event)">
    </form>

    <!-- completion popup: @file mentions or /slash commands (real, mouse-clickable) -->
    <div class="mention-pop" x-show="comp !== null" x-cloak>
      <div class="mhint" x-text="comp && comp.kind==='slash' ? 'slash commands — ↑↓ Enter · Esc' : 'files (@mention) — ↑↓ Enter · Esc'"></div>
      <template x-for="(it, i) in compList" :key="it.label">
        <div class="mrow" :class="{sel: comp && i===comp.sel}" @click="acceptCompAt(i)">
          <span x-text="it.label"></span><span class="muted" x-show="it.sub" x-text="'  ' + it.sub"></span>
        </div>
      </template>
    </div>

    <footer class="hints">
      <span><kbd>Ctrl</kbd>+<kbd>P</kbd> palette</span>
      <span><kbd>Ctrl</kbd>+<kbd>O</kbd> skills</span>
      <span><kbd>⇧</kbd>+<kbd>Tab</kbd> mode</span>
      <span><kbd>Esc</kbd> close</span>
      <span class="grow"></span>
      <span>type <code class="muted">help</code> for commands</span>
    </footer>

    <!-- toasts -->
    <div class="toasts">
      <template x-for="t in toasts" :key="t.id">
        <div class="toast" :class="t.tone">
          <div class="thead" x-text="t.title"></div>
          <div class="tbody" x-text="t.body"></div>
        </div>
      </template>
    </div>

    <!-- command palette -->
    <div class="scrim" x-show="overlay==='palette'" x-cloak @click.self="overlay=null">
      <div class="panel palette">
        <div class="ptitle">Command palette</div>
        <div class="query"><span class="glyph">❯</span> <span x-text="query"></span><span class="muted">▏</span></div>
        <ul>
          <template x-for="(c, i) in filtered" :key="c.trigger">
            <li :class="{sel: i===sel}" @click="run(c.trigger)">
              <span class="trig" x-text="c.trigger"></span><span class="desc" x-text="c.desc"></span>
            </li>
          </template>
        </ul>
        <div class="pfoot">↑↓ select · Enter run · Esc close</div>
      </div>
    </div>

    <!-- skill explorer -->
    <div class="scrim" x-show="overlay==='skills'" x-cloak @click.self="overlay=null">
      <div class="panel skills">
        <div class="ptitle" x-text="'Skill explorer · ' + skills.length + ' skills'"></div>
        <div class="split">
          <div class="list" :class="{'pane-active': pane==='list'}">
            <template x-for="(s, i) in skills" :key="s.name">
              <div class="item" :class="{sel: i===skillSel}" @click="skillSel=i; pane='preview'">
                <span x-text="s.name"></span>
              </div>
            </template>
          </div>
          <div class="preview md" :class="{'pane-active': pane==='preview'}" x-html="md(skills[skillSel].body)"></div>
        </div>
        <div class="pfoot">Tab switch pane · ↑↓ navigate · Enter insert name · Esc close</div>
      </div>
    </div>

    <!-- /mcp manager: servers table → per-server actions → tools (rows/buttons are clickable) -->
    <div class="scrim" x-show="overlay==='mcp'" x-cloak @click.self="overlay=null">
      <div class="panel mcp">
        <template x-if="mcpView==='list'">
          <div>
            <div class="ptitle">MCP servers</div>
            <table class="data mcp-table">
              <thead><tr><th>server</th><th>transport</th><th>status</th><th>tools</th></tr></thead>
              <tbody>
                <template x-for="(s, i) in mcpServers" :key="s.name">
                  <tr :class="{sel: i===mcpSel}" @click="mcpSel=i" @dblclick="mcpView='actions'; mcpAction=0">
                    <td x-text="s.name"></td>
                    <td class="muted" x-text="s.transport"></td>
                    <td :class="'st-'+s.status" x-text="s.status"></td>
                    <td class="muted" x-text="s.tools.length"></td>
                  </tr>
                </template>
              </tbody>
            </table>
            <div class="pfoot">↑↓ select · Enter / double-click manage · Esc close
              <button class="mbtn" @click="if(mcpServers.length){mcpView='actions'; mcpAction=0}">Manage ›</button></div>
          </div>
        </template>
        <template x-if="mcpView==='actions'">
          <div>
            <div class="ptitle"><span x-text="mcpServers[mcpSel].name"></span> · <span :class="'st-'+mcpServers[mcpSel].status" x-text="mcpServers[mcpSel].status"></span></div>
            <ul class="mcp-actions">
              <template x-for="(a, i) in mcpActions" :key="a">
                <li :class="{sel: i===mcpAction}" @click="mcpAction=i" @dblclick="mcpDoAction(i)" x-text="a"></li>
              </template>
            </ul>
            <div class="pfoot"><button class="mbtn" @click="mcpView='list'">‹ Back</button>
              <button class="mbtn" @click="mcpDoAction(mcpAction)" x-text="mcpActions[mcpAction]"></button></div>
          </div>
        </template>
        <template x-if="mcpView==='tools'">
          <div>
            <div class="ptitle"><span x-text="mcpServers[mcpSel].name"></span> · tools</div>
            <ul class="mcp-tools">
              <template x-for="t in mcpServers[mcpSel].tools" :key="t"><li x-text="'• ' + t"></li></template>
            </ul>
            <div class="pfoot"><button class="mbtn" @click="mcpView='actions'">‹ Back</button></div>
          </div>
        </template>
      </div>
    </div>
  </main>

  <!-- permission dialog: real focusable, mouse-clickable buttons (the "eventually" for the TUI) -->
  <dialog class="permission" x-ref="perm">
    <div class="dtitle" x-text="modal.title"></div>
    <div class="dbody">
      <div x-text="modal.intro"></div>
      <div class="cmd" x-text="modal.cmd"></div>
      <div class="risk" x-show="modal.risk" x-text="'risk: ' + modal.risk"></div>
    </div>
    <div class="actions">
      <button class="accept" :class="{focus: modal.focus==='accept'}"
              @click="resolveModal('accept')" @focus="modal.focus='accept'" x-text="'[ ' + modal.acceptLabel + ' ]'"></button>
      <button class="deny" :class="{focus: modal.focus==='deny'}"
              @click="resolveModal('deny')" @focus="modal.focus='deny'" x-text="'‹ ' + modal.denyLabel + ' ›'"></button>
    </div>
    <div class="dfoot">←/→ or Tab move · Enter confirm · Esc deny</div>
  </dialog>

  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script>
    // [x-cloak] hides elements until Alpine initializes (avoids flash of overlays).
    document.documentElement.style.setProperty("--x", "0");
    const style = document.createElement("style");
    style.textContent = "[x-cloak]{display:none!important}";
    document.head.appendChild(style);

    function harness() {
      return {
        // ── state ──────────────────────────────────────────────────────────
        messages: [],
        input: "",
        mode: "normal",
        modes: ["normal", "auto-accept", "plan"],
        tokens: 12300,
        sidebarOpen: true,
        overlay: null,            // null | 'palette' | 'skills'
        query: "",
        sel: 0,
        pane: "list",             // 'list' | 'preview'
        skillSel: 0,
        toasts: [],
        nextId: 1,
        streaming: null,          // interval handle while a response streams
        mention: null,            // selected index when the @file popup is open
        pastes: [],               // pasted chunks collapsed to chips in the current prompt
        mentionFiles: [
          "Mire/Core/Input.fs", "Mire/Layout/Layout.fs", "Mire/Renderer/Surface.fs",
          "Mire.AgentDemo/Program.fs", "Mire.AgentDemo/Theme.fs",
          "README.md", "ROADMAP.md", "SPEC.md", "DEMO-TODOS.md",
        ],
        spinnerFrames: "⠋⠙⠹⠸⠼⠴⠦⠧⠇⠏".split(""),
        spinnerI: 0,
        tasks: [{ name: "build", s: "run" }, { name: "tests", s: "ok" }, { name: "lint", s: "ok" }],
        files: ["└ src/", "  App.fs", "  Theme.fs", "└ tests/"],
        modal: { title: "", intro: "", cmd: "", risk: "", acceptLabel: "Accept", denyLabel: "Deny", focus: "accept", onAccept: null, onDeny: null },

        commands: [
          { trigger: "markdown",    desc: "markdown kitchen-sink" },
          { trigger: "code",        desc: "fenced code block" },
          { trigger: "list",        desc: "nested lists" },
          { trigger: "quote",       desc: "blockquote" },
          { trigger: "long",        desc: "long wrapped prose" },
          { trigger: "table",       desc: "data table" },
          { trigger: "stream",      desc: "streamed answer" },
          { trigger: "stream:long", desc: "long streamed answer" },
          { trigger: "tool",        desc: "tool call (ok)" },
          { trigger: "tool:error",  desc: "failing tool" },
          { trigger: "tool:run",    desc: "running tool (spinner)" },
          { trigger: "tools",       desc: "multiple tool calls" },
          { trigger: "bash",        desc: "bash command" },
          { trigger: "search",      desc: "search results" },
          { trigger: "thinking",    desc: "reasoning block" },
          { trigger: "diff",        desc: "unified diff" },
          { trigger: "files",       desc: "file tree" },
          { trigger: "tasks",       desc: "task timeline" },
          { trigger: "plan",        desc: "plan checklist" },
          { trigger: "turn",        desc: "full agent turn" },
          { trigger: "usage",       desc: "token usage / cost" },
          { trigger: "image",       desc: "image preview (fallback)" },
          { trigger: "mention",     desc: "@file mentions" },
          { trigger: "paste",       desc: "paste → chip help" },
          { trigger: "permission",  desc: "permission modal" },
          { trigger: "approval",    desc: "approval modal" },
          { trigger: "confirm",     desc: "confirm modal" },
          { trigger: "warning",     desc: "warning toast" },
          { trigger: "toast",       desc: "success toast" },
          { trigger: "error",       desc: "error card" },
          { trigger: "notice",      desc: "info notice" },
          { trigger: "help",        desc: "list commands" },
          { trigger: "clear",       desc: "clear transcript" },
          { trigger: "panel",       desc: "toggle sidebar" },
          { trigger: "mode",        desc: "cycle mode" },
          { trigger: "skills",      desc: "open skill explorer" },
          { trigger: "palette",     desc: "open command palette" },
        ],

        skills: [
          { name: "brainstorming",  body: "# Brainstorming\nTurn ideas into designs through collaborative dialogue.\n\n## When to use\n- starting any new feature\n- when scope is fuzzy\n\n## Steps\n1. explore context\n2. ask one question at a time\n3. propose 2-3 approaches\n4. present the design\n\n> The terminal state is a written, approved spec." },
          { name: "writing-plans",  body: "# Writing plans\nTurn an approved design into an executable plan.\n\n- one task per discrete step\n- name the critical files\n- include a verification section\n\n`dotnet build Mire.slnx` should pass before you call it done." },
          { name: "debugging",      body: "# Debugging\nFind the *root cause*, not the symptom.\n\n## Loop\n1. reproduce\n2. form a hypothesis\n3. add an observation\n4. confirm or refute\n\nNever fix what you cannot explain." },
          { name: "test-driven",    body: "# Test-driven\nRed → green → refactor.\n\n- write the failing test first\n- make it pass with the simplest code\n- refactor under green\n\nMire has **no test project yet** — see ROADMAP." },
          { name: "code-review",    body: "# Code review\nReview against intent, not taste.\n\n- correctness first\n- then maintainability\n- then performance *if it hurts*\n\nLeave the diff better than you found it." },
          { name: "using-git",      body: "# Using git\nSmall commits, honest messages.\n\n- branch off the default\n- commit when the user asks\n- never force-push shared history" },
          { name: "subagents",      body: "# Subagents\nDelegate independent work to parallel agents.\n\n- fan out for breadth\n- verify adversarially\n- synthesize the result\n\nThe conclusion comes back, not the file dumps." },
        ],

        get placeholder() {
          if (this.mode === "plan") return "plan mode — describe the change (try: markdown, diff, plan)";
          return "type a command — try: markdown, tool, diff, permission";
        },
        get filtered() {
          const q = this.query.toLowerCase();
          return this.commands.filter(c => c.trigger.includes(q) || c.desc.toLowerCase().includes(q));
        },
        // the active @token (text after the last space, if it starts with @), or null
        get mentionQuery() {
          const m = this.input.match(/(?:^|\s)@(\S*)$/);
          return m ? m[1] : null;
        },
        get mentionList() {
          const q = (this.mentionQuery || "").toLowerCase();
          return this.mentionFiles.filter(f => f.toLowerCase().includes(q));
        },

        // ── lifecycle ───────────────────────────────────────────────────────
        init() {
          this.welcome();
          setInterval(() => {
            this.spinnerI = (this.spinnerI + 1) % this.spinnerFrames.length;
          }, 90);
        },
        get spinner() { return this.spinnerFrames[this.spinnerI]; },

        push(b) { this.messages.push(b); this.$nextTick(() => { const s = this.$refs.scroll; if (s) s.scrollTop = s.scrollHeight; }); },
        toast(tone, title, body) {
          const id = this.nextId++;
          this.toasts.push({ id, tone, title, body });
          setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 3200);
        },
        cycleMode() { this.mode = this.modes[(this.modes.indexOf(this.mode) + 1) % this.modes.length]; },

        // ── input ─────────────────────────────────────────────────────────
        submit() {
          // If the mention popup is open, Enter accepts the selection instead of submitting.
          if (this.mention !== null) { const f = this.mentionList[this.mention]; if (f) this.acceptMention(f); return; }
          const text = this.input.trim();
          if (!text) return;
          this.input = "";
          this.mention = null;
          const pastes = this.pastes; this.pastes = [];
          this.stopStream();
          this.push({ kind: "user", text });
          for (const p of pastes) {
            const preview = p.content.length > 160 ? p.content.slice(0, 160) + "…" : p.content;
            this.push({ kind: "notice", text: "pasted content #" + p.id + " — " + p.content.length + " chars\n" + preview });
          }
          this.tokens += 120 + Math.floor(text.length * 3);
          this.respond(text.toLowerCase());
        },
        run(text) {
          this.overlay = null; this.query = ""; this.sel = 0; this.mention = null;
          this.stopStream();
          this.push({ kind: "user", text });
          this.tokens += 120 + Math.floor(text.length * 3);
          this.respond(text.toLowerCase());
        },

        // streaming: append one word per tick to the last assistant block
        stopStream() { if (this.streaming) { clearInterval(this.streaming); this.streaming = null; } },
        streamMd(src) {
          this.stopStream();
          const words = src.split(" ");
          this.push({ kind: "assistant", text: "" });
          const idx = this.messages.length - 1;   // mutate through the array so Alpine re-renders
          let i = 0;
          this.streaming = setInterval(() => {
            if (i >= words.length) { this.stopStream(); return; }
            const cur = this.messages[idx];
            cur.text = cur.text ? cur.text + " " + words[i] : words[i];
            i++;
            const s = this.$refs.scroll; if (s) s.scrollTop = s.scrollHeight;
          }, 45);
        },

        // @file mention completion
        onInput() {
          if (this.overlay) { this.mention = null; return; }
          if (this.mentionQuery !== null && this.mentionList.length) {
            this.mention = this.mention === null ? 0 : Math.min(this.mention, this.mentionList.length - 1);
          } else this.mention = null;
        },
        acceptMention(f) {
          this.input = this.input.replace(/(^|\s)@(\S*)$/, (_m, pre) => pre + "@" + f + " ");
          this.mention = null;
          this.$refs.input.focus();
        },

        // paste of a long / multi-line chunk → a [Pasted] chip + a note on submit
        onPaste(e) {
          const text = (e.clipboardData || window.clipboardData).getData("text");
          if (text && (text.includes("\n") || text.length >= 16)) {
            e.preventDefault();
            const id = this.nextId++;
            this.input += "[Pasted #" + id + " · " + text.length + " chars] ";
            this.pastes.push({ id, content: text });
            this.mention = null;
          }
        },

        onKey(e) {
          // global bindings
          if (e.key === "Tab" && e.shiftKey) { e.preventDefault(); this.cycleMode(); return; }
          if (e.ctrlKey && (e.key === "p" || e.key === "P")) { e.preventDefault(); this.overlay = this.overlay === "palette" ? null : "palette"; this.query = this.input; this.sel = 0; return; }
          if (e.ctrlKey && (e.key === "o" || e.key === "O")) { e.preventDefault(); this.overlay = this.overlay === "skills" ? null : "skills"; return; }
          // @mention popup nav (only when no overlay is open)
          if (!this.overlay && this.mention !== null) {
            if (e.key === "ArrowDown") { e.preventDefault(); this.mention = Math.min(this.mention + 1, this.mentionList.length - 1); return; }
            if (e.key === "ArrowUp") { e.preventDefault(); this.mention = Math.max(this.mention - 1, 0); return; }
            if (e.key === "Tab") { e.preventDefault(); const f = this.mentionList[this.mention]; if (f) this.acceptMention(f); return; }
            if (e.key === "Escape") { e.preventDefault(); this.mention = null; return; }
          }
          if (e.key === "Escape") {
            if (this.overlay) { e.preventDefault(); this.overlay = null; }
            else if (this.streaming) { e.preventDefault(); this.stopStream(); }
            return;
          }

          if (this.overlay === "palette") {
            if (e.key === "ArrowDown") { e.preventDefault(); this.sel = Math.min(this.sel + 1, this.filtered.length - 1); }
            else if (e.key === "ArrowUp") { e.preventDefault(); this.sel = Math.max(this.sel - 1, 0); }
            else if (e.key === "Enter") { e.preventDefault(); const c = this.filtered[this.sel]; if (c) this.run(c.trigger); }
            else { this.$nextTick(() => { this.query = this.input; this.sel = 0; }); }
          } else if (this.overlay === "skills") {
            if (e.key === "Tab") { e.preventDefault(); this.pane = this.pane === "list" ? "preview" : "list"; }
            else if (e.key === "ArrowDown") { e.preventDefault(); if (this.pane === "list") this.skillSel = Math.min(this.skillSel + 1, this.skills.length - 1); }
            else if (e.key === "ArrowUp") { e.preventDefault(); if (this.pane === "list") this.skillSel = Math.max(this.skillSel - 1, 0); }
            else if (e.key === "Enter") { e.preventDefault(); this.input += (this.input ? " " : "") + this.skills[this.skillSel].name; this.overlay = null; this.$refs.input.focus(); }
          }
        },

        // ── permission / approval / confirm modal ───────────────────────────
        openModal(spec) {
          this.modal = Object.assign({ acceptLabel: "Accept", denyLabel: "Deny", focus: "accept", risk: "" }, spec);
          const d = this.$refs.perm;
          d.showModal();
          this.$nextTick(() => d.querySelector("button.accept").focus());
          d.onkeydown = (e) => {
            if (e.key === "ArrowLeft" || e.key === "ArrowRight" || e.key === "Tab") {
              e.preventDefault();
              this.modal.focus = this.modal.focus === "accept" ? "deny" : "accept";
              d.querySelector(this.modal.focus === "accept" ? "button.accept" : "button.deny").focus();
            } else if (e.key === "Escape") { e.preventDefault(); this.resolveModal("deny"); }
          };
        },
        resolveModal(which) {
          this.$refs.perm.close();
          if (which === "accept") { this.toast("ok", "✓ accepted", this.modal.cmd || "proceeding"); this.modal.onAccept && this.modal.onAccept(); }
          else { this.toast("info", "denied", "no action taken"); this.modal.onDeny && this.modal.onDeny(); }
          this.$refs.input.focus();
        },

        // ── the Dummy: prompt → canned response ─────────────────────────────
        respond(t) {
          switch (t) {
            case "markdown": case "md": return this.push({ kind: "assistant", text: SAMPLES.markdown });
            case "code":   return this.push({ kind: "assistant", text: SAMPLES.code });
            case "list":   return this.push({ kind: "assistant", text: SAMPLES.list });
            case "quote":  return this.push({ kind: "assistant", text: SAMPLES.quote });
            case "long": case "lorem": return this.push({ kind: "assistant", text: SAMPLES.long });
            case "stream": return this.streamMd(SAMPLES.stream);
            case "stream:long": return this.streamMd(SAMPLES.long);
            case "stream:code": return this.streamMd(SAMPLES.code);
            case "table":  return this.push({ kind: "table", headers: ["ID", "Title", "Status"], rows: [
              { id: "#128", title: "Decode mouse (SGR 1006)", tone: "warn", status: "open" },
              { id: "#131", title: "Focus manager", tone: "warn", status: "open" },
              { id: "#140", title: "Scroll off-screen blit", tone: "ok", status: "done" },
            ] });
            case "tool":   return this.push({ kind: "tool", name: "shell", cmd: "dotnet build Mire.slnx", status: "ok", meta: "1.2s", out: "Build succeeded.\n  0 Warning(s)\n  0 Error(s)" });
            case "tool:error": return this.push({ kind: "tool", name: "shell", cmd: "npm test", status: "err", meta: "exit 1", out: "FAIL  src/app.test.ts\n  ✗ renders (12 ms)\n2 failed, 5 passed" });
            case "tool:run": {
              this.push({ kind: "tool", name: "shell", cmd: "npm install", status: "run", meta: "", out: "resolving packages…" });
              const idx = this.messages.length - 1;   // mutate through the array so Alpine re-renders
              setTimeout(() => { const b = this.messages[idx]; b.status = "ok"; b.meta = "4.1s"; b.out = "added 312 packages in 4s"; }, 1600);
              return;
            }
            case "tools": return [
              { kind: "tool", name: "read", cmd: "Mire.AgentDemo/Theme.fs", status: "ok", meta: "", out: "" },
              { kind: "tool", name: "edit", cmd: "Mire.AgentDemo/Theme.fs", status: "ok", meta: "+12 -3", out: "" },
              { kind: "tool", name: "shell", cmd: "dotnet build", status: "ok", meta: "1.2s", out: "Build succeeded." },
            ].forEach(b => this.push(b));
            case "bash": return this.push({ kind: "tool", name: "bash", cmd: "git status -s", status: "ok", meta: "0.1s", out: " M Program.fs\n ?? Theme.fs" });
            case "search": return this.push({ kind: "tool", name: "search", cmd: "rg \"Scroll\" -n", status: "ok", meta: "4 matches", out: "Layout/Layout.fs:33:  | Scroll of Rect * ScrollState\nWidgets/Widgets.fs:108: module Scroll" });
            case "thinking": return this.push({ kind: "thinking", text: "The user wants a second demo. I should reuse the existing layout primitives rather than inventing new nodes, and keep agent concepts out of the core libraries…" });
            case "diff": return this.push({ kind: "diff", file: "Mire.Protocol/InputParser.fs", lines: [
              { t: "ctx", s: "  | 0x44uy -> Some { Key = ArrowLeft; … }" },
              { t: "add", s: "+ | 0x5Auy -> Some { Key = Tab; Modifiers = { None with Shift = true } }" },
              { t: "ctx", s: "  | 0x48uy -> Some { Key = Home; … }" },
            ] });
            case "files": case "tree": return this.push({ kind: "files", text: "└ Mire.AgentDemo/\n  Theme.fs\n  Markdown.fs\n  Blocks.fs\n  Dummy.fs\n  Skills.fs\n  PromptInput.fs\n  Program.fs" });
            case "tasks": case "timeline": return this.push({ kind: "plan", steps: [
              { text: "init model", done: true }, { text: "run dummy", done: true }, { text: "stream tokens", done: false }, { text: "resolve tool", done: false },
            ] });
            case "plan": return this.push({ kind: "plan", steps: [
              { text: "HTML prototype", done: true }, { text: "Shift+Tab decode", done: true }, { text: "AgentDemo project", done: true }, { text: "@mentions + paste", done: false }, { text: "docs", done: false },
            ] });
            case "turn": {
              [ { kind: "thinking", text: "Plan: read the file, make the edit, rebuild, then summarize." },
                { kind: "tool", name: "edit", cmd: "Program.fs", status: "ok", meta: "+8 -2", out: "" } ].forEach(b => this.push(b));
              return this.push({ kind: "assistant", text: "Done — added the **@mention** popup and rebuilt. See `Program.fs` and @DEMO-TODOS.md." });
            }
            case "usage": case "cost": return this.push({ kind: "table", headers: ["item", "tokens", "usd"], rows: [
              { id: "input", title: "8,210", tone: "", status: "$0.02" },
              { id: "output", title: "1,940", tone: "", status: "$0.03" },
              { id: "total", title: "10,150", tone: "ok", status: "$0.05" },
            ] });
            case "image": return this.push({ kind: "notice", text: "▢ image: chart.png\n[image preview unavailable] — Kitty graphics not wired yet (ROADMAP v0.5)." });
            case "mention": return this.push({ kind: "assistant", text: "I read @Mire/Layout/Layout.fs and @README.md.\n\nType `@` in the prompt to pick a file — a completion popup appears; arrows + Enter insert it." });
            case "paste": return this.push({ kind: "notice", text: "Paste a long or multi-line block into the prompt — it collapses into a `[Pasted #N · L chars]` chip, and the content shows as a note when you submit." });
            case "permission": return this.openModal({ title: "Permission required", intro: "Mire wants to run a tool:", cmd: "rm -rf bin obj && dotnet test", risk: "medium" });
            case "approval": case "approve": return this.openModal({ title: "Approve command?", intro: "The agent proposes to run:", cmd: "git push --force origin main", risk: "high", acceptLabel: "Approve", denyLabel: "Reject" });
            case "confirm": return this.openModal({ title: "Confirm", intro: "Clear the transcript?", cmd: "", acceptLabel: "Yes", denyLabel: "No", onAccept: () => { this.messages = []; } });
            case "warning": return this.toast("warn", "! warning", "3 files have uncommitted changes");
            case "toast": case "toast:success": return this.toast("ok", "✓ success", "Tests passed in 1.2s");
            case "toast:info": return this.toast("info", "info", "Indexed 1,204 files");
            case "toast:error": return this.toast("err", "✗ error", "Connection refused");
            case "error": return this.push({ kind: "error", text: "Unhandled exception: Sequence contains no elements\n  at Mire.Layout.measure (Layout.fs:142)" });
            case "notice": return this.push({ kind: "notice", text: "This harness is not wired to an LLM. Responses are canned — type `help`." });
            case "help": case "?": case "commands": return this.push({ kind: "assistant", text: this.helpText() });
            case "clear": case "reset": this.messages = []; return;
            case "panel": case "split": case "sidebar": this.sidebarOpen = !this.sidebarOpen; return;
            case "mode": this.cycleMode(); return;
            case "skills": case "explore": this.overlay = "skills"; return;
            case "palette": this.overlay = "palette"; this.query = ""; this.sel = 0; return;
            case "welcome": return this.welcome();
            default: return this.push({ kind: "assistant", text: "You said: **" + t + "**\n\nThis is a canned harness — type `help` to see what it can show." });
          }
        },

        helpText() {
          let s = "# Commands\nType any of these and press Enter.\n\n";
          for (const c of this.commands) s += "- `" + c.trigger + "` — " + c.desc + "\n";
          return s;
        },
        welcome() {
          this.push({ kind: "assistant", text: "# └ mire · AgentDemo\nA testbed for the agentic-TUI features in `SPEC.md`. Not wired to an LLM — the **Dummy** module supplies canned responses.\n\nTry `markdown`, `tool:run`, `diff`, `permission`, `@`-mentions, or `help`. Press `Ctrl+O` for the skill explorer, `Shift+Tab` to switch mode." });
        },

        // ── tiny markdown → HTML (approximate, like the F# renderer) ─────────
        md(src) {
          const esc = (x) => x.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
          const inline = (x) => esc(x)
            .replace(/`([^`]+)`/g, "<code>$1</code>")
            .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
            .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>")
            .replace(/~~([^~]+)~~/g, "<del>$1</del>")
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
            .replace(/(^|\s)(@[^\s<]+)/g, '$1<span class="mention">$2</span>');
          const lines = src.split("\n");
          let out = "", i = 0;
          while (i < lines.length) {
            const l = lines[i];
            if (l.startsWith("```")) {
              let code = ""; i++;
              while (i < lines.length && !lines[i].startsWith("```")) { code += lines[i] + "\n"; i++; }
              i++; out += "<pre><code>" + esc(code) + "</code></pre>"; continue;
            }
            if (/^### /.test(l)) out += "<h3>" + inline(l.slice(4)) + "</h3>";
            else if (/^## /.test(l)) out += "<h2>" + inline(l.slice(3)) + "</h2>";
            else if (/^# /.test(l)) out += "<h1>" + inline(l.slice(2)) + "</h1>";
            else if (/^> /.test(l)) out += "<blockquote>" + inline(l.slice(2)) + "</blockquote>";
            else if (/^---/.test(l)) out += "<hr>";
            else if (/^\s*[-*] /.test(l)) {
              let items = "";
              while (i < lines.length && /^\s*[-*] /.test(lines[i])) { items += "<li>" + inline(lines[i].replace(/^\s*[-*] /, "")) + "</li>"; i++; }
              out += "<ul>" + items + "</ul>"; continue;
            }
            else if (/^\s*\d+\. /.test(l)) {
              let items = "";
              while (i < lines.length && /^\s*\d+\. /.test(lines[i])) { items += "<li>" + inline(lines[i].replace(/^\s*\d+\. /, "")) + "</li>"; i++; }
              out += "<ol>" + items + "</ol>"; continue;
            }
            else if (l.trim() === "") { /* skip */ }
            else out += "<p>" + inline(l) + "</p>";
            i++;
          }
          return out;
        },
      };
    }
